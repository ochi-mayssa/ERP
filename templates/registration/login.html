{% extends "base.html" %}
{% load static %}

{% block title %}Login | Factory ERP{% endblock %}

{% block extra_head %}
<style>
    body {
        background: linear-gradient(135deg, #2563EB 0%, #4F46E5 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .login-card {
        width: 100%;
        max-width: 400px;
        background: white;
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    .login-logo {
        text-align: center;
        margin-bottom: 2rem;
    }
    .login-logo i {
        font-size: 3rem;
        color: #2563EB;
    }
    .login-title {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        color: #1F2937;
        margin-bottom: 0.5rem;
    }
    .login-subtitle {
        text-align: center;
        color: #6B7280;
        margin-bottom: 2rem;
        font-size: 0.875rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-card">
    <div class="login-logo">
        <i class="fas fa-industry"></i>
    </div>
    <h1 class="login-title">Factory ERP</h1>
    <p class="login-subtitle">Sign in to manage your factory</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required autofocus placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required placeholder="••••••••">
        </div>
        
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="form-check d-flex align-items-center gap-2">
                <input type="checkbox" name="remember" id="remember" class="form-check-input">
                <label for="remember" class="mb-0 small">Remember me</label>
            </div>
            <a href="#" class="small text-primary text-decoration-none">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
